<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DinoisAwesome Annotator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app">

  <!-- ── Left: image gallery ─────────────────────────────────────────── -->
  <aside class="panel-left">
    <h2 class="panel-title">Images</h2>
    <ul id="image-list" class="image-list"></ul>
  </aside>

  <!-- ── Center: canvas area ──────────────────────────────────────────── -->
  <main class="canvas-area">
    <div class="status-bar">
      <span id="status-bar">Select an image to begin</span>
      <span id="canvas-info" class="canvas-info"></span>
    </div>
    <div class="canvas-scroll">
      <div class="canvas-stack">
        <canvas id="image-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
      </div>
    </div>
  </main>

  <!-- ── Right: controls ──────────────────────────────────────────────── -->
  <aside class="panel-right">

    <section>
      <div id="model-info" class="model-info">Model: —</div>
      <button id="reset-view-btn" class="btn btn-sm" style="width:100%;margin-top:4px;" title="Reset zoom and pan (Ctrl+0)">Reset View</button>
    </section>

    <section>
      <h3 class="section-title">Class</h3>
      <select id="class-select"></select>
      <div class="row">
        <input id="new-class-input" type="text" placeholder="New class name…">
        <button id="add-class-btn" class="btn btn-sm">Add</button>
      </div>
    </section>

    <section>
      <h3 class="section-title">Instance ID</h3>
      <input id="instance-id-input" type="number" value="1" min="1">
    </section>

    <section>
      <h3 class="section-title">Prompt Type</h3>
      <label class="radio-label">
        <input type="radio" name="prompt-type" value="points" checked> Points (left-click=fg · right-click=bg)
      </label>
      <label class="radio-label">
        <input type="radio" name="prompt-type" value="boxes"> Boxes (left-drag=positive · right-drag=negative)
      </label>
      <label class="radio-label">
        <input type="radio" name="prompt-type" value="text"> Text
      </label>
      <label class="radio-label">
        <input type="radio" name="prompt-type" value="mixed"> Mixed (boxes + text)
      </label>
      <label class="radio-label">
        <input type="radio" name="prompt-type" value="points_boxes"> Points + Boxes (click=point · drag=box)
      </label>
    </section>

    <section>
      <h3 class="section-title">Options</h3>
      <label class="radio-label">
        <input type="checkbox" id="filter-by-prompt"> Filter to prompted region
      </label>
    </section>

    <section id="text-prompt-section" style="display:none;">
      <h3 class="section-title">Text Prompt</h3>
      <input id="text-prompt-input" type="text" placeholder="e.g. cat, person, car…">
    </section>

    <section>
      <div class="btn-row">
        <button id="undo-btn" class="btn btn-warning" title="Remove the last added point or box">Undo</button>
        <button id="clear-instance-btn" class="btn btn-warning" title="Clear all prompts for the current mode">Clear Instance</button>
      </div>
      <button id="clear-all-btn" class="btn btn-danger" title="Remove ALL prompts (points, boxes, text) — confirmation required">Clear All Prompts</button>
      <button id="segment-btn" class="btn">Segment</button>
      <button id="save-btn" class="btn btn-success">Save Annotation</button>
    </section>

    <section id="mask-section">
      <h3 class="section-title">Returned Masks</h3>
      <div id="mask-prev-container"></div>
    </section>

    <section>
      <h3 class="section-title">Annotations</h3>
      <ul id="annotation-list"></ul>
    </section>

  </aside>
</div>
<script src="{{ url_for('static', filename='js/mask_editor.js') }}" defer></script>
</body>
</html>
